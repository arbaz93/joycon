<!-- Hamburger Menu Button -->
<button class="hamburger-menu" id="hamburger-menu" aria-label="Open settings">☰</button>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settings-overlay"></div>

<!-- Settings Panel -->
<div class="settings-panel" id="settings-panel">
    <div class="settings-header">
        <h2>Settings</h2>
        <button class="settings-close" id="settings-close" aria-label="Close settings">✕</button>
    </div>

    <div class="settings-content">

        <!-- Display Section -->
        <div class="settings-section">
            <h3>Display</h3>
            <div class="settings-group">
                <button class="settings-button" id="fullscreen-toggle-btn">Enter Full Screen</button>
            </div>
        </div>

        <!-- Layout Management Section -->
        <div class="settings-section">
            <h3>Layout Management</h3>
            <div class="settings-group">
                <button class="settings-button" id="save-layout-btn">Save Current Layout</button>
                <button class="settings-button" id="reset-layout-btn">Reset to Default</button>
                <button class="settings-button" id="center-controls-btn">Center All Controls</button>
            </div>
        </div>

        <!-- Template System Section -->
        <div class="settings-section">
            <h3>Templates</h3>
            <div class="settings-group">
                <div class="settings-row">
                    <label class="settings-label">Select Template:</label>
                    <select id="template-select-settings" class="settings-select"></select>
                </div>
                <button class="settings-button" id="new-template-btn">Create New</button>
                <button class="settings-button danger" id="delete-template-btn">Delete</button>
            </div>
        </div>

        <!-- Visibility Controls Section -->
        <div class="settings-section">
            <h3>Control Visibility</h3>
            <div class="visibility-controls">
                <div class="visibility-item">
                    <input type="checkbox" id="vis-left-stick" class="visibility-checkbox" checked>
                        <label class="settings-label" for="vis-left-stick">Left Joystick (Static)</label>
                </div>
                <div class="visibility-item">
                    <input type="checkbox" id="vis-left-stick-dynamic" class="visibility-checkbox">
                        <label class="settings-label" for="vis-left-stick-dynamic">Left Joystick (Dynamic)</label>
                </div>
                <div class="visibility-item">
                    <input type="checkbox" id="vis-right-stick" class="visibility-checkbox" checked>
                        <label class="settings-label" for="vis-right-stick">Right Joystick</label>
                </div>
                <div class="visibility-item">
                    <input type="checkbox" id="vis-dpad" class="visibility-checkbox" checked>
                        <label class="settings-label" for="vis-dpad">D-Pad</label>
                </div>
                <div class="visibility-item">
                    <input type="checkbox" id="vis-face-buttons" class="visibility-checkbox" checked>
                        <label class="settings-label" for="vis-face-buttons">Face Buttons (A/B/X/Y)</label>
                </div>
                <div class="visibility-item">
                    <input type="checkbox" id="vis-shoulders" class="visibility-checkbox" checked>
                        <label class="settings-label" for="vis-shoulders">Shoulder Buttons (L1/L2/R1/R2)</label>
                </div>
            </div>
        </div>

        <!-- Scale Controls Section -->
        <div class="settings-section">
            <h3>Global Scaling</h3>
            <div class="settings-group">
                <div class="settings-row">
                    <label class="settings-label">Button Size:</label>
                    <span class="slider-value" id="button-scale-value">100%</span>
                </div>
                <input type="range" id="button-scale" class="settings-range" min="50" max="150" value="100">

                    <div class="settings-row">
                        <label class="settings-label">Joystick Size:</label>
                        <span class="slider-value" id="joystick-scale-value">100%</span>
                    </div>
                    <input type="range" id="joystick-scale" class="settings-range" min="50" max="150" value="100">

                        <div class="settings-row">
                            <label class="settings-label">D-Pad Size:</label>
                            <span class="slider-value" id="dpad-scale-value">100%</span>
                        </div>
                        <input type="range" id="dpad-scale" class="settings-range" min="50" max="150" value="100">

                            <div class="settings-row">
                                <label class="settings-label">Shoulder Buttons Size:</label>
                                <span class="slider-value" id="button-set-scale-value">100%</span>
                            </div>
                            <input type="range" id="button-set-scale" class="settings-range" min="50" max="150" value="100">
            </div>
        </div>



        <!-- Fine Position Adjustment Section -->
        <div class="settings-section">
            <h3>Fine Position Control</h3>
            <div class="settings-group">
                <p class="settings-label" style="margin: 0; font-size: 0.75rem; opacity: 0.7;">Move selected control:</p>
                <div class="arrow-buttons">
                    <div></div>
                    <button class="arrow-btn" id="arrow-up" title="Move up">↑</button>
                    <div></div>
                    <button class="arrow-btn" id="arrow-left" title="Move left">←</button>
                    <button class="arrow-btn" id="arrow-center" title="Center">●</button>
                    <button class="arrow-btn" id="arrow-right" title="Move right">→</button>
                    <div></div>
                    <button class="arrow-btn" id="arrow-down" title="Move down">↓</button>
                    <div></div>
                </div>
            </div>
        </div>

        <!-- Import/Export Section -->
        <div class="settings-section">
            <h3>Import / Export</h3>
            <div class="settings-group">
                <button class="settings-button" id="export-layout-btn">Export as JSON</button>
                <button class="settings-button" id="import-layout-btn">Import from JSON</button>
                <input type="file" id="import-file-settings" accept=".json" style="display: none;">
            </div>
        </div>

        <!-- Edit Mode Toggle -->
        <div class="settings-section">
            <h3>Editor</h3>
            <div class="settings-group">
                <button class="settings-button" id="edit-mode-btn">Enable Edit Mode</button>
                <p class="settings-label" style="margin: 0.5rem 0 0 0; font-size: 0.75rem; opacity: 0.7;">
                    Edit mode allows you to drag and resize controls.
                </p>
            </div>
        </div>
    </div>
</div>

<div class="controller">
    <section class="panel" aria-label="Left controller">
        <div class="top-row">
            <div class="button-set editable" data-layout-id="left-shoulders">
                <button class="btn" data-button="L2">L2</button>
                <button class="btn" data-button="L1">L1</button>
            </div>
        </div>
        <div class="stick-container editable" data-stick-type="dynamic" id="dynamic" data-layout-id="left-stick-dynamic">
            <div class="playground dynamic editable" id="left-stick-dynamic-playground" aria-label="Left analog stick" >
               <virtual-joystick class="thumb" id="left-thumb-dynamic" data-mode="dynamic"></virtual-joystick>
            </div>
        </div>

        <div class="stick-container editable" data-stick-type="static" data-layout-id="left-stick">
            <div class="stick" id="left-stick" aria-label="Left analog stick">
                <div class="thumb" id="left-thumb"></div>
            </div>
        </div>

        <div>
            <div class="dpad editable" role="group" aria-label="D-pad" data-layout-id="dpad">
                <button disabled aria-hidden="true"></button>
                <button class="btn" data-button="Up"></button>
                <button disabled aria-hidden="true"></button>
                <button class="btn" data-button="Left"></button>
                <button disabled aria-hidden="true"></button>
                <button class="btn" data-button="Right"></button>
                <button disabled aria-hidden="true"></button>
                <button class="btn" data-button="Down"></button>
                <button disabled aria-hidden="true"></button>
            </div>
        </div>
    </section>

    <section class="panel" aria-label="Right controller">
        <div class="top-row">
            <div class="button-set editable" data-layout-id="right-shoulders">
                <button class="btn" data-button="R1">R1</button>
                <button class="btn" data-button="R2">R2</button>
            </div>
        </div>

        <div class="stick-container editable" data-stick-type="static" data-layout-id="right-stick">
            <div class="stick" id="right-stick" aria-label="Right analog stick">
                <div class="thumb" id="right-thumb"></div>
            </div>
        </div>

        <div>
            <div class="face-buttons editable" role="group" aria-label="Face buttons" data-layout-id="face-buttons">
                <button class="btn btn-a" data-button="A">A</button>
                <button class="btn btn-b" data-button="B">B</button>
                <button class="btn btn-x" data-button="X">X</button>
                <button class="btn btn-y" data-button="Y">Y</button>
            </div>
        </div>
    </section>

    <div class="system-buttons" data-layout-id="system-buttons" role="group" aria-label="System buttons">
        <button class="btn sys-btn" data-button="Select">Select</button>
        <button class="btn sys-btn" data-button="Start">Start</button>
    </div>

    <div class="home-button" data-layout-id="home-button" role="button" aria-label="Home">
        <button class="btn home-btn" data-button="Home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" aria-hidden="true">

            </svg>
        </button>
    </div>
</div>

<div class="hint">Touch and drag the sticks; hold buttons to send input.</div>
