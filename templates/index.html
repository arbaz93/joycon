<!DOCTYPE html>
<html lang="en">
<head>

    FILE OVERVIEW:
    Flask template shell for the web controller app. It loads base styles,
    Socket.IO, and the lightweight bootstrap script that injects controller UI.

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>WebController</title>

  <link rel="shortcut icon" href="{{ url_for('static', filename='icons/logo.png') }}" type="image/x-icon">
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>


  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/joystick.css') }}">

</head>
